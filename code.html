<html lang="en">
<head>

<body>
    <div class="container">

    <div class="code-layout">
        <nav class="code-side-menu" aria-label="Code examples">
            <h2>Examples.</h2>
            <ul>
                <li><button type="button" class="active" data-example="game-of-life">From Traffic Simulations to Game of Life (Rust + WASM)</button></li>
            </ul>
        </nav>

        <section class="code-example-panel">
            <h2 id="code-example-title">From Traffic Simulations to Game of Life (Rust + WASM)</h2>
            <iframe id="code-frame" title="Selected code example" loading="lazy"></iframe>
            <p class="code-note">
                Open in new tab:
                <a id="code-open-link" href="code_resources/game_of_life.html" target="_blank" rel="noopener">code_resources/game_of_life.html</a>
            </p>
        </section>
    </div>

    <div class="contact">
        <a href="mailto:georgetucker.a@gmail.com" aria-label="Email">
            <i class="fas fa-envelope"></i>
        </a>
        <a href="https://github.com/Georgea75" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/george-alexander-709401134/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>
    </div>
    </div>

    <script>
    (function () {
        const examples = {
            "game-of-life": {
                title: "From Traffic Simulations to Game of Life (Rust + WASM)",
                path: "code_resources/game_of_life.html"
            }
        };

        const buttons = Array.from(document.querySelectorAll("[data-example]"));
        const frame = document.getElementById("code-frame");
        const titleEl = document.getElementById("code-example-title");
        const openLink = document.getElementById("code-open-link");

        const requested = new URLSearchParams(window.location.search).get("example");
        const defaultKey = examples[requested] ? requested : Object.keys(examples)[0];

        function setExample(key) {
            const example = examples[key];
            if (!example) {
                return;
            }

            buttons.forEach((button) => {
                button.classList.toggle("active", button.dataset.example === key);
            });

            titleEl.textContent = example.title;
            frame.src = example.path;
            openLink.href = example.path;
            openLink.textContent = example.path;

            const url = new URL(window.location.href);
            url.searchParams.set("example", key);
            window.history.replaceState({}, "", url);
        }

        buttons.forEach((button) => {
            button.addEventListener("click", () => setExample(button.dataset.example));
        });

        setExample(defaultKey);
    })();
    </script>
</body>
</html>
